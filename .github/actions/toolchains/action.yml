name: Install toolchains
description: "Helper to install ZKVM toolchains."
inputs: {}
outputs: {}

runs:
  using: "composite"
  steps:
    - name: Set up Clang
      uses: egor-tensin/setup-clang@ef434b41eb33a70396fb336b1bae39c76d740c3d # v1
      with:
        version: latest
        platform: x64

    - name: Install protoc
      uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
      with:
        repo-token: ${{ github.token }}

    - name: Install SP1 Toolchain
      shell: bash
      run: |
        curl -fsSL --proto '=https' --tlsv1.2 https://sp1.succinct.xyz | bash && ~/.sp1/bin/sp1up
        export PATH=~/.sp1/bin:$PATH
        cargo prove --version

    - name: Install RISC0 Toolchain
      shell: bash
      run: |
        curl -fsSL --proto '=https' --tlsv1.2 https://risczero.com/install | bash
        export PATH=~/.risc0/bin:$PATH
        rzup install rust 1.91.1
        rzup install cpp 2024.1.5
        rzup install r0vm 3.0.4
        rzup install cargo-risczero 3.0.4
