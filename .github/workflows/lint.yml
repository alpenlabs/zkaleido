name: Lint

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

permissions: {}

jobs:
  extract-rust-version:
    name: Extract Rust toolchain version
    runs-on: ubuntu-latest
    outputs:
      rust-version: ${{ steps.extract.outputs.rust-version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false
      - name: Extract Rust toolchain version
        id: extract
        uses: ./.github/actions/extract-rust-version # zizmor: ignore[unpinned-uses]

  clippy:
    name: Run clippy on crates
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false
      - name: Install toolchains
        uses: ./.github/actions/toolchains # zizmor: ignore[unpinned-uses]
      - name: Install Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          cache-on-failure: true
      # Currently, sp1 and risc0 guest builds are skipped when it is invoked under clippy.
      # This makes the whole build of clippy fail, so we run clippy on adapters and examples.
      # The core `zkaleido` crate has no guest-build deps, so it is linted directly as the
      # primary crate (adapter builds only pull it in as a `--cap-lints allow` dependency,
      # which hides its own lints).
      - name: Run clippy on zkaleido
        run: cargo clippy --manifest-path zkaleido/Cargo.toml --all-features -- -D warnings
        env:
          RUSTFLAGS: -D warnings
      - name: Run clippy on adapters/
        run: |
          find adapters/ -type f -name "Cargo.toml" \
          -exec sh -c \
          'f="$1"; echo "Clippy for ${f}" && \
          cargo clippy --manifest-path ${f} --all-features -- -D warnings' shell {} \;
        env:
          RUSTFLAGS: -D warnings
      - name: Run clippy on examples/
        run: |
          find examples/ -type f -name "Cargo.toml" \
          -exec sh -c \
          'f="$1"; echo "Clippy for ${f}" && \
          cargo clippy --manifest-path ${f} --all-features -- -D warnings' shell {} \;
        env:
          RUSTFLAGS: -D warnings

  crate-checks:
    name: Check that crates compile on their own
    runs-on: ubuntu-latest
    needs: extract-rust-version
    timeout-minutes: 90 # cold run takes a lot of time as each crate is compiled separately
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false

      - name: Cleanup space
        uses: ./.github/actions/cleanup # zizmor: ignore[unpinned-uses]
      - name: Install toolchains
        uses: ./.github/actions/toolchains # zizmor: ignore[unpinned-uses]

      - name: Install Rust toolchain
        run: rustup toolchain install "$RUST_VERSION"
        env:
          RUST_VERSION: ${{ needs.extract-rust-version.outputs.rust-version }}
      - uses: taiki-e/install-action@1b0e852a3465a29cd0b17876f2de42a88d145e91 # cargo-hack
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          cache-on-failure: true
      - name: Configure sccache
        run: |
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo  "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: "v0.10.0" # sccache version

      # `sp1-core-executor-runner`'s build.rs builds a helper binary and embeds
      # it via `include_bytes!(env!("SP1_CORE_RUNNER_BINARY"))`. When pulled from
      # crates.io, the binary is written *inside* the registry source dir
      # (`~/.cargo/registry/src/.../sp1-core-executor-runner-X.Y.Z/target/`),
      # which `Swatinem/rust-cache` does not preserve — but it does cache the
      # build-script output that records the path. On a cache hit cargo skips
      # rerunning the build script, then `include_bytes!` fails with "couldn't
      # read ..." because the binary is gone. Clean these crates so build.rs
      # always re-runs and re-creates the binary.
      - run: cargo clean -p sp1-core-executor-runner -p sp1-core-executor-runner-binary
      - run: cargo hack check --locked

  fmt:
    name: Check code formatting
    runs-on: ubuntu-latest
    needs: extract-rust-version
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        run: rustup toolchain install "$RUST_VERSION" --component rustfmt
        env:
          RUST_VERSION: ${{ needs.extract-rust-version.outputs.rust-version }}
      - run: cargo fmt --all --check

  codespell:
    name: Check code spellings
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false
      - uses: codespell-project/actions-codespell@8f01853be192eb0f849a5c7d721450e7a467c579 # v2

  taplo:
    name: Lint and check formatting of TOML files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false
      - name: Install taplo
        run: |
          curl -fsSL https://github.com/tamasfe/taplo/releases/latest/download/taplo-full-linux-x86_64.gz \
            | gzip -d - | install -m 755 /dev/stdin /usr/local/bin/taplo
      - name: Run taplo lint
        run: |
          taplo lint
      - name: Run taplo format check
        run: |
          taplo fmt --check

  lint-success:
    name: Check that lints passed
    runs-on: ubuntu-latest
    if: always()
    needs:
      - clippy
      - crate-checks
      - fmt
      - codespell
      - taplo
    timeout-minutes: 30
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}
